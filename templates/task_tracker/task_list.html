<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task list</title>
</head>
<body>
    {% for task in tasks %}
        <a href="{% url 'task-detail' task.pk %}"> {{ task.title }} </a>
        <p> {{ task.description }} </p>
        <p> {{ task.status }} </p>
    {% endfor %}
    <a href="{% url 'task-create' %}">Створити завдання</a>
</body>
</html>
