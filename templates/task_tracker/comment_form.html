{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <title>Змінити коментар</title>
</head>
<body>
    <h1 class="edit_text">Змінити коментар</h1>
    <div class="d-flex justify-content-center align-items-center vh-100">
        <form class="d-flex flex-column gap-2" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <h2>Опис: {{ form.text }}</h2>
            {% if form.instance.media %}
                <div>
                    <label class="current_media_tag" for="{{ form.media.id_for_label }}">Поточне медіа:</label>
                        <a href="{{ form.instance.media.url }}">
                            {{ form.instance.media.name }}
                        </a>
                </div>
            {% endif %}
                <div class="row">
                    <label class="col-sm-3 text-nowrap change_media_tag" for="{{ form.media.id_for_label }}">Змінити медіа:</label>
                    <div class="col-sm-7 change_media">
                        <input type="file" name="media" id="{{ form.media.id_for_label }}" class="form-control">
                    </div>
                </div>
                <div class="d-grid gap-2">
                    <button class="btn btn-primary" type="submit">Змінити</button>
                    <a class="btn btn-danger" href="{% url 'delete-comment' comment.pk %}" role="button">Видалити коментар</a>
                    <a class="btn btn-secondary" href="{% url 'task-detail' object.task.pk %}" role="button">Повернутися</a>
                </div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
</body>
</html>
